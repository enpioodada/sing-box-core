name: Update sing-box
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".github/workflows/delete-old-workflows.yml"
      - ".github/workflows/update-dashboard.yml"

jobs:
  go:
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.go.outputs.version }}
    steps:
      - name: Get `Go` latest version
        id: go
        run: |
          echo "version=$(curl -sSL https://raw.githubusercontent.com/actions/go-versions/update-versions-manifest-file/versions-manifest.json | jq -r '.[0].version')" >> $GITHUB_OUTPUT

  puernya:
    runs-on: ubuntu-latest
    needs: go
    outputs:
      puernya_version: ${{ steps.puernya.outputs.puernya_version }}
      puernya_time: ${{ steps.puernya.outputs.puernya_time }}
      puernya_tags: ${{ steps.puernya.outputs.puernya_tags }}
      puernya_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `building`
        uses: actions/checkout@v6
        with:
          repository: PuerNya/sing-box
          ref: building
          fetch-depth: 0

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Get `sing-box PuerNya` version
        id: puernya
        run: |
          git remote add sekai https://github.com/SagerNet/sing-box.git
          git fetch --tags sekai
          puernya_version=$(CGO_ENABLED=0 go run ./cmd/internal/read_tag)
          ver_commit=$(echo "${puernya_version}" | awk -F '-' '{print $3}')
          puernya_time=$(git log -1 --format=%cd --date=format:'%Y-%m-%d' "$ver_commit")
          echo "puernya_version=$puernya_version" >> $GITHUB_OUTPUT
          echo "puernya_time=$puernya_time" >> $GITHUB_OUTPUT
          echo "puernya_tags=with_quic,with_dhcp,with_wireguard,with_shadowsocksr,with_ech,with_utls,with_clash_api,with_gvisor" >> $GITHUB_OUTPUT

      - name: Compare `sing-box PuerNya` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          if echo "$current_body" | grep -q "${{ steps.puernya.outputs.puernya_version }}.*${{ steps.puernya.outputs.puernya_time }}"; then
            echo "当前 sing-box PuerNya 版本已是最新版本 ${{ steps.puernya.outputs.puernya_version }}，无需更新"
            skip_update=true
          else
            echo "当前 sing-box PuerNya 版本较低，需要更新最新版本至 ${{ steps.puernya.outputs.puernya_version }}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  puernya_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.puernya.outputs.puernya_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # linux
          - { name: linux-amd64, goos: linux, goarch: amd64, goamd64: v1 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7 }
          - { name: linux-arm64, goos: linux, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - puernya
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      puernya_VERSION: ${{ needs.puernya.outputs.puernya_version }}
      puernya_TAGS: ${{ needs.puernya.outputs.puernya_tags }}
    steps:
      - name: Checkout `building`
        uses: actions/checkout@v6
        with:
          repository: PuerNya/sing-box
          ref: building

      - name: Fix sniff
        run: sed -i 's/sniffHosts/sniffHost/' ./experimental/clashapi/trafficontrol/tracker.go

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box PuerNya` core
        id: build
        run: go build -v -trimpath -ldflags "-checklinkname=0 -X 'github.com/sagernet/sing-box/constant.Version=${puernya_VERSION}' -s -w -buildid=" -tags "${puernya_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-puernya-${{ matrix.name }}
          path: sing-box*
          
  ref1nd_stable_version:
    runs-on: ubuntu-latest
    needs: go
    outputs:
      ref1nd_stable_version: ${{ steps.version.outputs.ref1nd_stable_version }}
      ref1nd_stable_time: ${{ steps.version.outputs.ref1nd_stable_time }}
      ref1nd_stable_tags: ${{ steps.version.outputs.ref1nd_stable_tags }}
      ref1nd_stable_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `reF1nd-stable`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable
          fetch-depth: 0

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Get `sing-box reF1nd-Stable` version
        id: version
        run: |
          echo "ref1nd_stable_version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases/latest | jq -r '.tag_name' | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "ref1nd_stable_time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases/latest | jq -r '.published_at // .created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "ref1nd_stable_tags=with_gvisor,with_quic,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: Compare `sing-box reF1nd-Stable` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box reF1nd-Stable|${{ steps.version.outputs.ref1nd_stable_version }}|${{ steps.version.outputs.ref1nd_stable_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  ref1nd_stable_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1 }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7 }
          - { name: linux-arm64, goos: linux, goarch: arm64 }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - ref1nd_stable_version
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      ref1nd_stable_VERSION: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_version }}
      ref1nd_stable_TAGS: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_tags }}
    steps:
      - name: Checkout `reF1nd-stable`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-stable

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box reF1nd-Stable` core
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${ref1nd_stable_VERSION}' -s -w -buildid=" -tags "${ref1nd_stable_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-ref1nd-stable-${{ matrix.name }}
          path: sing-box*

  ref1nd_test_version:
    runs-on: ubuntu-latest
    needs: go
    outputs:
      ref1nd_test_version: ${{ steps.version.outputs.ref1nd_test_version }}
      ref1nd_test_time: ${{ steps.version.outputs.ref1nd_test_time }}
      ref1nd_test_tags: ${{ steps.version.outputs.ref1nd_test_tags }}
      ref1nd_test_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `reF1nd-testing`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-testing
          fetch-depth: 0

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Get `sing-box reF1nd-Test` version
        id: version
        run: |
          echo "ref1nd_test_version=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases | jq -r '.[] | select(.tag_name | test("alpha|beta|rc")) | .tag_name' | head -n 1 | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "ref1nd_test_time=$(curl -sSL https://api.github.com/repos/reF1nd/sing-box-releases/releases | jq -r '.[] | select(.tag_name | test("alpha|beta|rc")) | (.published_at // .created_at)' | head -n 1 | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "ref1nd_test_tags=with_gvisor,with_quic,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: Compare `sing-box reF1nd-Test` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box reF1nd-Test|${{ steps.version.outputs.ref1nd_test_version }}|${{ steps.version.outputs.ref1nd_test_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  ref1nd_test_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1, variant: musl }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3, variant: musl }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7, variant: musl }
          - { name: linux-arm64, goos: linux, goarch: arm64, variant: musl }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - ref1nd_test_version
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      ref1nd_test_VERSION: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_version }}
      ref1nd_test_TAGS: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_tags }}
    steps:
      - name: Checkout `reF1nd-testing`
        uses: actions/checkout@v6
        with:
          repository: reF1nd/sing-box
          ref: reF1nd-testing

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box reF1nd-Test` core
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${ref1nd_test_VERSION}' -s -w -buildid=" -tags "${ref1nd_test_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-ref1nd-test-${{ matrix.name }}
          path: sing-box*

  singbox_stable_version:
    runs-on: ubuntu-latest
    needs: go
    outputs:
      singbox_stable_version: ${{ steps.version.outputs.singbox_stable_version }}
      singbox_stable_time: ${{ steps.version.outputs.singbox_stable_time }}
      singbox_stable_tags: ${{ steps.version.outputs.singbox_stable_tags }}
      singbox_stable_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `stable`
        uses: actions/checkout@v6
        with:
          repository: SagerNet/sing-box
          ref: stable
          fetch-depth: 0

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Get `sing-box Stable` version
        id: version
        run: |
          echo "singbox_stable_version=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name' | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "singbox_stable_time=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.published_at // .created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "singbox_stable_tags=with_gvisor,with_quic,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: Compare `sing-box Stable` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box Stable|${{ steps.version.outputs.singbox_stable_version }}|${{ steps.version.outputs.singbox_stable_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  singbox_stable_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.singbox_stable_version.outputs.singbox_stable_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1 }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7 }
          - { name: linux-arm64, goos: linux, goarch: arm64 }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - singbox_stable_version
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      singbox_stable_VERSION: ${{ needs.singbox_stable_version.outputs.singbox_stable_version }}
      singbox_stable_TAGS: ${{ needs.singbox_stable_version.outputs.singbox_stable_tags }}
    steps:
      - name: Checkout `stable`
        uses: actions/checkout@v6
        with:
          repository: SagerNet/sing-box
          ref: stable

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box Stable` core
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${singbox_stable_VERSION}' -s -w -buildid=" -tags "${singbox_stable_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-stable-${{ matrix.name }}
          path: sing-box*

  singbox_test_version:
    runs-on: ubuntu-latest
    needs: go
    outputs:
      singbox_test_version: ${{ steps.version.outputs.singbox_test_version }}
      singbox_test_time: ${{ steps.version.outputs.singbox_test_time }}
      singbox_test_tags: ${{ steps.version.outputs.singbox_test_tags }}
      singbox_test_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Checkout `testing`
        uses: actions/checkout@v6
        with:
          repository: SagerNet/sing-box
          ref: testing
          fetch-depth: 0

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Get `sing-box Test` version
        id: version
        run: |
          echo "singbox_test_version=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases | jq -r '.[] | select(.tag_name | test("alpha|beta|rc")) | .tag_name' | head -n 1 | sed 's/^v//')" >> $GITHUB_OUTPUT
          echo "singbox_test_time=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases | jq -r '.[] | select(.tag_name | test("alpha|beta|rc")) | (.published_at // .created_at)' | head -n 1 | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "singbox_test_tags=with_gvisor,with_quic,with_utls,with_clash_api" >> $GITHUB_OUTPUT

      - name: Compare `sing-box Test` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/sing-box" | jq -r '.body // ""')
          arch="sing-box Test|${{ steps.version.outputs.singbox_test_version }}|${{ steps.version.outputs.singbox_test_time }}"
          IFS="|" read -r name version time <<< "$arch"
          if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
            echo "当前 ${name} 版本已是最新版本 v${version}，无需更新"
            skip_update=true
          else
            echo "当前 ${name} 版本较低，需要更新最新版本至 v${version}"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  singbox_test_cross:
    runs-on: ubuntu-latest
    if: ${{ needs.singbox_test_version.outputs.singbox_test_skip_update != 'true' }}
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux-amd64-v1, goos: linux, goarch: amd64, goamd64: v1, variant: musl }
          - { name: linux-amd64-v3, goos: linux, goarch: amd64, goamd64: v3, variant: musl }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: 7, variant: musl }
          - { name: linux-arm64, goos: linux, goarch: arm64, variant: musl }
          # Windows
          - { name: windows-amd64-v1, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows-amd64-v3, goos: windows, goarch: amd64, goamd64: v3 }
          - { name: windows-arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - singbox_test_version
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOAMD64: ${{ matrix.goamd64 }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: 0
      singbox_test_VERSION: ${{ needs.singbox_test_version.outputs.singbox_test_version }}
      singbox_test_TAGS: ${{ needs.singbox_test_version.outputs.singbox_test_tags }}
    steps:
      - name: Checkout `testing`
        uses: actions/checkout@v6
        with:
          repository: SagerNet/sing-box
          ref: testing

      - name: Setup `Go`
        uses: actions/setup-go@v6
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Build `sing-box Test` core
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${singbox_test_VERSION}' -s -w -buildid=" -tags "${singbox_test_TAGS}" ./cmd/sing-box

      - name: Upload files to workspace
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-test-${{ matrix.name }}
          path: sing-box*

  push_sing-box:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - ref1nd_stable_version
      - ref1nd_stable_cross
      - puernya
      - puernya_cross
      - ref1nd_test_version
      - ref1nd_test_cross
      - singbox_stable_version
      - singbox_stable_cross
      - singbox_test_version
      - singbox_test_cross
    env:
      ref1nd_stable_VERSION: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_version }}
      ref1nd_stable_TIME: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_time }}
      ref1nd_stable_Skip_update: ${{ needs.ref1nd_stable_version.outputs.ref1nd_stable_skip_update }}
      ref1nd_test_VERSION: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_version }}
      ref1nd_test_TIME: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_time }}
      ref1nd_test_Skip_update: ${{ needs.ref1nd_test_version.outputs.ref1nd_test_skip_update }}
      singbox_stable_VERSION: ${{ needs.singbox_stable_version.outputs.singbox_stable_version }}
      singbox_stable_TIME: ${{ needs.singbox_stable_version.outputs.singbox_stable_time }}
      singbox_stable_Skip_update: ${{ needs.singbox_stable_version.outputs.singbox_stable_skip_update }}
      singbox_test_VERSION: ${{ needs.singbox_test_version.outputs.singbox_test_version }}
      singbox_test_TIME: ${{ needs.singbox_test_version.outputs.singbox_test_time }}
      singbox_test_Skip_update: ${{ needs.singbox_test_version.outputs.singbox_test_skip_update }}
      puernya_VERSION: ${{ needs.puernya.outputs.puernya_version }}
      puernya_TIME: ${{ needs.puernya.outputs.puernya_time }}
    steps: 
      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Download files from workspace
        uses: actions/download-artifact@v8
        with:
          path: ./tmp/
      
      - name: Move files and zip `sing-box PuerNya` cores by `tar`
        if: ${{ needs.puernya.outputs.puernya_skip_update != 'true' }}
        run: |
          # Linux
          mkdir -p ./sing-box/
          archs=(amd64 armv7 arm64)
          for arch in "${archs[@]}"; do
            mv -f "./tmp/sing-box-puernya-linux-${arch}/sing-box" ./tmp/sing-box
            chmod +x ./tmp/sing-box
            tar --no-same-owner -czf "./sing-box/sing-box-puernya-linux-${arch}.tar.gz" -C ./tmp/ sing-box
          done

          
      
      - name: Download `sing-box reF1nd-Stable` files
        if: ${{ env.ref1nd_stable_Skip_update != 'true' }}
        run: |
          # Linux
          mkdir -p ./sing-box/
          linux_archs=(amd64-v1 amd64-v3 armv7 arm64)
          for i in "${!linux_archs[@]}"; do
            mv -f "./tmp/sing-box-ref1nd-stable-linux-${linux_archs[i]}/sing-box" ./tmp/sing-box
            # Compress cores by `tar`
            chmod +x ./tmp/sing-box
            tar --no-same-owner -czf "./sing-box/sing-box-ref1nd-stable-linux-${linux_archs[i]}.tar.gz" -C ./tmp/ sing-box

            # Ready for compress cores by `UPX`
            mv -f ./tmp/sing-box ./sing-box/sing-box-ref1nd-stable-linux-${linux_archs[i]}.upx
            chmod +x ./sing-box/sing-box-ref1nd-stable-linux-${linux_archs[i]}.upx
          done

          # Windows
          windows_archs=(amd64-v1 amd64-v3 arm64)
          for j in "${!windows_archs[@]}"; do
            mv -f "./tmp/sing-box-ref1nd-stable-windows-${windows_archs[j]}/sing-box.exe" "./sing-box/sing-box-ref1nd-stable-windows-${windows_archs[j]}.exe"
          done


      - name: Download `sing-box reF1nd-Test` files
        if: ${{ env.ref1nd_test_Skip_update != 'true' }}
        run: |
          # Linux
          mkdir -p ./sing-box/
          linux_archs=(amd64-v1 amd64-v3 armv7 arm64)
          for i in "${!linux_archs[@]}"; do
            mv -f "./tmp/sing-box-ref1nd-test-linux-${linux_archs[i]}/sing-box" ./tmp/sing-box

            # Compress cores by `tar`
            chmod +x ./tmp/sing-box
            tar --no-same-owner -czf "./sing-box/sing-box-ref1nd-test-linux-${linux_archs[i]}.tar.gz" -C ./tmp/ sing-box

            # Ready for compress cores by `UPX`
            mv -f ./tmp/sing-box ./sing-box/sing-box-ref1nd-test-linux-${linux_archs[i]}.upx
            chmod +x ./sing-box/sing-box-ref1nd-test-linux-${linux_archs[i]}.upx
          done

          # Windows
          windows_archs=(amd64-v1 amd64-v3 arm64)
          for j in "${!windows_archs[@]}"; do
            mv -f "./tmp/sing-box-ref1nd-test-windows-${windows_archs[j]}/sing-box.exe" "./sing-box/sing-box-ref1nd-test-windows-${windows_archs[j]}.exe"
          done



      - name: Download `sing-box Stable` files
        if: ${{ env.singbox_stable_Skip_update != 'true' }}
        run: |
          # Linux
          mkdir -p ./sing-box/
          linux_archs=(amd64-v1 amd64-v3 armv7 arm64)
          for i in "${!linux_archs[@]}"; do
            mv -f "./tmp/sing-box-stable-linux-${linux_archs[i]}/sing-box" ./tmp/sing-box
            # Compress cores by `tar`
            chmod +x ./tmp/sing-box
            tar --no-same-owner -czf "./sing-box/sing-box-stable-linux-${linux_archs[i]}.tar.gz" -C ./tmp/ sing-box

            # Ready for compress cores by `UPX`
            mv -f ./tmp/sing-box ./sing-box/sing-box-stable-linux-${linux_archs[i]}.upx
            chmod +x ./sing-box/sing-box-stable-linux-${linux_archs[i]}.upx
          done

          # Windows
          windows_archs=(amd64-v1 amd64-v3 arm64)
          for j in "${!windows_archs[@]}"; do
            mv -f "./tmp/sing-box-stable-windows-${windows_archs[j]}/sing-box.exe" "./sing-box/sing-box-stable-windows-${windows_archs[j]}.exe"
          done

      - name: Download `sing-box Test` files
        if: ${{ env.singbox_stable_Skip_update != 'true' }}
        run: |
          # Linux
          mkdir -p ./sing-box/
          linux_archs=(amd64-v1 amd64-v3 armv7 arm64)
          for i in "${!linux_archs[@]}"; do
            mv -f "./tmp/sing-box-test-linux-${linux_archs[i]}/sing-box" ./tmp/sing-box
            # Compress cores by `tar`
            chmod +x ./tmp/sing-box
            tar --no-same-owner -czf "./sing-box/sing-box-test-linux-${linux_archs[i]}.tar.gz" -C ./tmp/ sing-box

            # Ready for compress cores by `UPX`
            mv -f ./tmp/sing-box ./sing-box/sing-box-test-linux-${linux_archs[i]}.upx
            chmod +x ./sing-box/sing-box-test-linux-${linux_archs[i]}.upx
          done

          # Windows
          windows_archs=(amd64-v1 amd64-v3 arm64)
          for j in "${!windows_archs[@]}"; do
            mv -f "./tmp/sing-box-test-windows-${windows_archs[j]}/sing-box.exe" "./sing-box/sing-box-test-windows-${windows_archs[j]}.exe"
          done

      - name: Setup `UPX` and compress `sing-box` files
        if: ${{ env.ref1nd_stable_Skip_update != 'true' || env.ref1nd_test_Skip_update != 'true' || env.singbox_stable_Skip_update != 'true' || env.singbox_test_Skip_update != 'true' }}
        uses: crazy-max/ghaction-upx@v4
        with:
          version: latest
          files: ./sing-box/*.upx

      - name: Check if `sing-box` files exist
        id: check
        run: |
          if ls ./sing-box/* >/dev/null 2>&1; then
            echo "sing-box 文件夹内存在新内核文件，需要上传"
            echo "singbox_exist=true" >> $GITHUB_OUTPUT
          else
            echo "sing-box 文件夹内没有新内核文件，无需上传"
            echo "singbox_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Release and upload `sing-box` assets
        if: ${{ steps.check.outputs.singbox_exist == 'true' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: sing-box
          tag: sing-box
          overwrite: true
          body: |
            # 📝 Release Notes 
            1. 更新 [sing-box reF1nd-Stable 版](https://github.com/reF1nd/sing-box/tree/reF1nd-stable)至 v${{ env.ref1nd_stable_VERSION }}，发布于 ${{ env.ref1nd_stable_TIME }}
            2. 更新 [sing-box reF1nd-Test 版](https://github.com/reF1nd/sing-box/tree/reF1nd-testing)至 v${{ env.ref1nd_test_VERSION }}，发布于 ${{ env.ref1nd_test_TIME }}
            3. 更新 [sing-box Stable 版](https://github.com/SagerNet/sing-box/tree/stable)至 v${{ env.singbox_stable_VERSION }}，发布于 ${{ env.singbox_stable_TIME }}
            4. 更新 [sing-box Test 版](https://github.com/SagerNet/sing-box/tree/testing)至 v${{ env.singbox_test_VERSION }}，发布于 ${{ env.singbox_test_TIME }}
            5. 更新 [sing-box PuerNya 版](https://github.com/PuerNya/sing-box/tree/building) 至 v${{ env.puernya_VERSION }}，发布于 ${{ env.puernya_TIME }}
          file_glob: true
          file: ./sing-box/*

      - name: Set outputs for update_readme
        id: vars
        run: |
          echo "singbox_stable_VERSION=${singbox_stable_VERSION}" >> $GITHUB_OUTPUT
          echo "singbox_stable_TIME=${singbox_stable_TIME}" >> $GITHUB_OUTPUT
          echo "singbox_test_VERSION=${singbox_test_VERSION}" >> $GITHUB_OUTPUT
          echo "singbox_test_TIME=${singbox_test_TIME}" >> $GITHUB_OUTPUT
          echo "puernya_version=${puernya_VERSION}" >> $GITHUB_OUTPUT
          echo "puernya_time=${puernya_TIME}" >> $GITHUB_OUTPUT
          echo "ref1nd_stable_VERSION=${ref1nd_stable_VERSION}" >> $GITHUB_OUTPUT
          echo "ref1nd_stable_TIME=${ref1nd_stable_TIME}" >> $GITHUB_OUTPUT
          echo "ref1nd_test_VERSION=${ref1nd_test_VERSION}" >> $GITHUB_OUTPUT
          echo "ref1nd_test_TIME=${ref1nd_test_TIME}" >> $GITHUB_OUTPUT
    outputs:
      singbox_stable_VERSION: ${{ steps.vars.outputs.singbox_stable_VERSION }}
      singbox_stable_TIME: ${{ steps.vars.outputs.singbox_stable_TIME }}
      singbox_test_VERSION: ${{ steps.vars.outputs.singbox_test_VERSION }}
      singbox_test_TIME : ${{ steps.vars.outputs.singbox_test_TIME }}
      puernya_version: ${{ steps.vars.outputs.puernya_version }}
      puernya_time: ${{ steps.vars.outputs.puernya_time }}
      ref1nd_stable_VERSION: ${{ steps.vars.outputs.ref1nd_stable_VERSION }}
      ref1nd_stable_TIME: ${{ steps.vars.outputs.ref1nd_stable_TIME }}
      ref1nd_test_VERSION: ${{ steps.vars.outputs.ref1nd_test_VERSION }}
      ref1nd_test_TIME: ${{ steps.vars.outputs.ref1nd_test_TIME }}

  Update_Readme:
    runs-on: ubuntu-latest
    if: always()
    needs: [puernya, push_sing-box]
    steps:
    - uses: actions/checkout@v6

    - name: Generate README
      run: |
        cat > README.md <<EOF
        # Sing-Box核心编译

        ## sing-box 内核 PuerNya 版

        \`\`\`
        curl -L https://github.com/enpioodada/sing-box-core/releases/download/sing-box/sing-box-puernya-linux-amd64.tar.gz | tar -zx -C /usr/local/bin
        \`\`\`

        ## sing-box 内核 reF1nd-Stable 版

        \`\`\`
        curl -L https://github.com/enpioodada/sing-box-core/releases/download/sing-box/sing-box-ref1nd-stable-linux-amd64-v3.tar.gz | tar -zx -C /usr/local/bin
        \`\`\`

        ## Changelog

        1. 更新 [sing-box PuerNya 版](https://github.com/PuerNya/sing-box/tree/building)至 v${{ needs.push_sing-box.outputs.puernya_VERSION }}，发布于 ${{ needs.push_sing-box.outputs.puernya_TIME }}
        2. 更新 [sing-box reF1nd-Stable 版](https://github.com/reF1nd/sing-box/tree/reF1nd-stable)至 v${{ needs.push_sing-box.outputs.ref1nd_stable_VERSION }}，发布于 ${{ needs.push_sing-box.outputs.ref1nd_stable_TIME }}
        3. 更新 [sing-box reF1nd-Test 版](https://github.com/reF1nd/sing-box/tree/reF1nd-testing)至 v${{ needs.push_sing-box.outputs.ref1nd_test_VERSION }}，发布于 ${{ needs.push_sing-box.outputs.ref1nd_test_TIME }}
        4. 更新 [sing-box Stable 版](https://github.com/SagerNet/sing-box/tree/stable)至 ${{ needs.push_sing-box.outputs.singbox_stable_VERSION }}，发布于 ${{ needs.push_sing-box.outputs.singbox_stable_TIME }}
        5. 更新 [sing-box Test 版](https://github.com/SagerNet/sing-box/tree/testing)至 ${{ needs.push_sing-box.outputs.singbox_test_VERSION }}，发布于 ${{ needs.push_sing-box.outputs.singbox_test_TIME }}
        EOF

    - name: Commit README
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add README.md
        git commit -m "Update README" || echo "No changes"
        git push
